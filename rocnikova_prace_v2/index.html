<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>FoxPass</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="screen-auth">
        <h3 id="auth-title">Login</h3>
        <p id="auth-sub"></p>
        <input type="text" id="email" placeholder="Vypňte Username  ">
        <input type="password" id="password" placeholder="Heslo">
        <button id="btn-submit">Login</button>
        <div id="error-msg" class="error"></div>
        <button id="toggle-mode">Sign Up</button>
    </div>

    <div id="screen-vault" class="hidden">
        <button id="btn-logout">Logout</button>
        <hr>
        <input type="text" id="site" placeholder="Web (např. www.gyarab.cz)">
        <input type="text" id="login" placeholder="Jméno/Email">
        <input type="password" id="pass" placeholder="Heslo">
        <button id="btn-save">Uložit</button>
        <div id="loading" class="hidden">Zpracovávání</div>
        <h3>Uložená hesla</h3>
        <div id="vault-list"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
